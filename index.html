<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RBLX Trend Scanner</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Bebas+Neue&display=swap');

:root {
–red: #ff3131;
–black: #0a0a0a;
–white: #f0f0f0;
–gray: #1a1a1a;
–mid: #2a2a2a;
}

- { margin: 0; padding: 0; box-sizing: border-box; }

body {
background: var(–black);
color: var(–white);
font-family: ‘Space Mono’, monospace;
min-height: 100vh;
overflow-x: hidden;
}

body::before {
content: ‘’;
position: fixed;
inset: 0;
background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
pointer-events: none;
z-index: 999;
}

header {
padding: 28px 24px 16px;
border-bottom: 2px solid var(–red);
}

header h1 {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 52px;
letter-spacing: 6px;
line-height: 1;
}

header h1 span { color: var(–red); }

.tag {
font-size: 10px;
letter-spacing: 3px;
color: var(–red);
border: 1px solid var(–red);
padding: 3px 7px;
text-transform: uppercase;
margin-bottom: 5px;
animation: blink 1.4s step-end infinite;
display: inline-block;
}

@keyframes blink { 0%,100%{opacity:1}50%{opacity:0.3} }

.proxy-bar {
background: #111;
border-bottom: 1px solid var(–mid);
padding: 10px 24px;
display: flex;
align-items: center;
gap: 10px;
}

.proxy-dot {
width: 8px; height: 8px;
background: #3a3;
border-radius: 50%;
flex-shrink: 0;
animation: blink 1.4s step-end infinite;
}

.proxy-label {
font-size: 10px;
letter-spacing: 2px;
color: #3a3;
text-transform: uppercase;
}

.proxy-url {
font-size: 9px;
letter-spacing: 1px;
color: #444;
margin-left: auto;
}

.controls {
padding: 16px 24px;
display: flex;
flex-direction: column;
gap: 12px;
border-bottom: 1px solid var(–mid);
}

.control-row {
display: flex;
align-items: center;
gap: 10px;
flex-wrap: wrap;
}

.control-label {
font-size: 10px;
letter-spacing: 2px;
color: #555;
text-transform: uppercase;
width: 70px;
flex-shrink: 0;
}

.btn-group { display: flex; border: 1px solid var(–mid); }

.btn-group button {
background: transparent;
color: var(–white);
border: none;
padding: 8px 14px;
font-family: ‘Space Mono’, monospace;
font-size: 10px;
letter-spacing: 2px;
cursor: pointer;
text-transform: uppercase;
transition: all 0.15s;
border-right: 1px solid var(–mid);
}

.btn-group button:last-child { border-right: none; }
.btn-group button.active, .btn-group button:hover { background: var(–red); }

.cat-group { display: flex; gap: 8px; flex-wrap: wrap; }

.cat-btn {
background: transparent;
color: var(–white);
border: 1px solid var(–mid);
padding: 7px 12px;
font-family: ‘Space Mono’, monospace;
font-size: 10px;
letter-spacing: 1px;
cursor: pointer;
text-transform: uppercase;
transition: all 0.15s;
}

.cat-btn.active { border-color: var(–red); color: var(–red); }

.scan-btn {
width: 100%;
background: var(–red);
color: var(–white);
border: none;
padding: 14px;
font-family: ‘Space Mono’, monospace;
font-size: 12px;
letter-spacing: 4px;
cursor: pointer;
text-transform: uppercase;
display: flex;
align-items: center;
justify-content: center;
gap: 10px;
transition: opacity 0.2s;
margin-top: 4px;
}

.scan-btn:hover { opacity: 0.85; }
.scan-btn:disabled { opacity: 0.4; cursor: not-allowed; }

.dot {
width: 8px; height: 8px;
background: white;
border-radius: 50%;
flex-shrink: 0;
}

.scan-btn.scanning .dot { animation: pulse 0.6s ease-in-out infinite alternate; }
@keyframes pulse { from{transform:scale(1);opacity:1} to{transform:scale(1.6);opacity:0.4} }

.panel {
background: var(–gray);
border: 1px solid var(–mid);
margin: 20px 24px;
}

.panel-header {
padding: 11px 18px;
border-bottom: 1px solid var(–mid);
font-size: 10px;
letter-spacing: 3px;
text-transform: uppercase;
color: #666;
display: flex;
justify-content: space-between;
align-items: center;
}

.panel-header .count { color: var(–red); font-size: 11px; }

.view-tabs { display: flex; border-bottom: 1px solid var(–mid); }

.view-tab {
padding: 9px 18px;
font-size: 10px;
letter-spacing: 2px;
text-transform: uppercase;
cursor: pointer;
border-right: 1px solid var(–mid);
background: transparent;
color: #555;
border-top: none; border-left: none; border-bottom: none;
font-family: ‘Space Mono’, monospace;
transition: all 0.15s;
}

.view-tab.active { color: var(–white); background: var(–mid); }

.keyword-grid {
padding: 16px;
display: flex;
flex-wrap: wrap;
gap: 8px;
min-height: 200px;
align-content: flex-start;
}

.kw-chip {
display: flex;
align-items: center;
gap: 8px;
background: var(–black);
border: 1px solid var(–mid);
padding: 6px 10px;
position: relative;
overflow: hidden;
}

.kw-chip::before {
content: ‘’;
position: absolute;
left: 0; top: 0; bottom: 0;
background: var(–red);
opacity: 0.12;
}

.kw-chip .word {
font-size: 11px;
font-weight: 700;
letter-spacing: 1px;
text-transform: uppercase;
position: relative;
}

.kw-chip .freq { font-size: 9px; color: var(–red); position: relative; }

.kw-chip.rank-1 { border-color: #ffd700; }
.kw-chip.rank-1 .word { color: #ffd700; }
.kw-chip.rank-2 { border-color: #c0c0c0; }
.kw-chip.rank-2 .word { color: #c0c0c0; }
.kw-chip.rank-3 { border-color: #cd7f32; }
.kw-chip.rank-3 .word { color: #cd7f32; }

.bar-chart { padding: 16px; display: flex; flex-direction: column; gap: 10px; }

.bar-row {
display: grid;
grid-template-columns: 80px 1fr 36px;
align-items: center;
gap: 8px;
}

.bar-label {
font-size: 9px; letter-spacing: 1px; text-transform: uppercase;
text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

.bar-track { background: var(–black); height: 12px; border: 1px solid var(–mid); }
.bar-fill { height: 100%; background: var(–red); transition: width 0.6s cubic-bezier(.4,0,.2,1); }
.bar-val { font-size: 9px; color: var(–red); }

.log-panel {
padding: 12px 16px;
border-top: 1px solid var(–mid);
font-size: 9px;
color: #444;
letter-spacing: 1px;
line-height: 2;
min-height: 60px;
}

.log-entry.active { color: #888; }
.log-entry.done { color: #3a3; }
.log-entry.err { color: #c44; }

.item-entry {
padding: 10px 16px;
border-bottom: 1px solid var(–mid);
transition: background 0.15s;
}

.item-entry:last-child { border-bottom: none; }
.item-name { font-size: 10px; margin-bottom: 4px; line-height: 1.4; }
.item-meta { display: flex; gap: 10px; font-size: 9px; color: #555; }

.keyword-badge {
display: inline-block;
font-size: 9px;
background: rgba(255,49,49,0.12);
color: var(–red);
border: 1px solid rgba(255,49,49,0.3);
padding: 2px 6px;
margin-top: 4px;
letter-spacing: 1px;
text-transform: uppercase;
}

.empty-state {
width: 100%; padding: 40px 20px;
text-align: center; color: #333;
}

.empty-state .icon { font-size: 36px; display: block; margin-bottom: 10px; }
.empty-state p { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; line-height: 1.8; }
</style>

</head>
<body>

<header>
  <div class="tag">● Live Scanner</div>
  <h1>RBLX <span>TREND</span> SCANNER</h1>
  <div style="font-size:10px;color:#333;letter-spacing:2px;margin-top:4px;">2D CLOTHING KEYWORD ANALYZER</div>
</header>

<div class="proxy-bar">
  <div class="proxy-dot"></div>
  <div class="proxy-label">Proxy Connected</div>
  <div class="proxy-url">rblx-proxy-wztg.onrender.com</div>
</div>

<div class="controls">
  <div class="control-row">
    <div class="control-label">Period</div>
    <div class="btn-group">
      <button class="active" data-period="daily">Daily</button>
      <button data-period="weekly">Weekly</button>
      <button data-period="monthly">Monthly</button>
    </div>
  </div>
  <div class="control-row">
    <div class="control-label">Category</div>
    <div class="cat-group">
      <button class="cat-btn active" data-cat="11">Shirts</button>
      <button class="cat-btn" data-cat="12">Pants</button>
      <button class="cat-btn" data-cat="2">T-Shirts</button>
    </div>
  </div>
  <button class="scan-btn" id="scanBtn">
    <span class="dot"></span>
    SCAN TRENDS
  </button>
</div>

<div class="panel">
  <div class="panel-header">
    <span>Top Trending Keywords</span>
    <span class="count" id="kwCount">—</span>
  </div>
  <div class="view-tabs">
    <button class="view-tab active" data-view="chips">Cloud</button>
    <button class="view-tab" data-view="bars">Chart</button>
  </div>
  <div id="keywordDisplay">
    <div class="keyword-grid">
      <div class="empty-state">
        <span class="icon">📡</span>
        <p>Press SCAN TRENDS<br>to analyze live data</p>
      </div>
    </div>
  </div>
  <div class="log-panel" id="logPanel">
    <div class="log-entry">// ready — tap scan trends</div>
  </div>
</div>

<div class="panel">
  <div class="panel-header">
    <span>Scanned Items</span>
    <span class="count" id="itemCount">—</span>
  </div>
  <div id="itemList">
    <div style="padding:30px 20px;text-align:center;color:#333;font-size:10px;letter-spacing:2px;">NO DATA YET</div>
  </div>
</div>

<script>
const PROXY = 'https://rblx-proxy-wztg.onrender.com';

const STOPWORDS = new Set([
  'the','a','an','and','or','of','in','on','at','to','for','with','by',
  'from','is','it','its','this','that','these','those','my','your','our',
  'their','be','been','has','have','had','do','does','did','will','would',
  'could','should','may','might','can','not','no','nor','so','yet','both',
  'but','if','as','up','out','about','than','more','into','through',
  'new','old','big','small','cool','nice','cute','best','good','great',
  'shirt','tshirt','pants','top','bottom','clothing','outfit','wear',
  'roblox','rblx','classic','style','pack','set','item','edition','limited',
  'ugc','free','sale','store','shop','buy','get','ver','version',
  'i','me','we','you','he','she','they','who','what','when','where','how',
]);

const CATEGORY_MAP = {
  '11': { name: 'Shirts', subcategoryId: 12 },
  '12': { name: 'Pants', subcategoryId: 13 },
  '2':  { name: 'T-Shirts', subcategoryId: 2 },
};

let currentPeriod = 'daily';
let currentCat = '11';
let currentView = 'chips';
let scannedItems = [];
let keywordFreq = {};
let isScanning = false;

const scanBtn = document.getElementById('scanBtn');
const logPanel = document.getElementById('logPanel');
const itemList = document.getElementById('itemList');
const keywordDisplay = document.getElementById('keywordDisplay');
const kwCount = document.getElementById('kwCount');
const itemCount = document.getElementById('itemCount');

document.querySelectorAll('.btn-group button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.btn-group button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentPeriod = btn.dataset.period;
  });
});

document.querySelectorAll('.cat-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentCat = btn.dataset.cat;
  });
});

document.querySelectorAll('.view-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentView = tab.dataset.view;
    renderKeywords();
  });
});

function log(msg, type = 'active') {
  const entries = logPanel.querySelectorAll('.log-entry');
  entries.forEach(e => e.classList.remove('active'));
  const div = document.createElement('div');
  div.className = `log-entry ${type}`;
  div.textContent = `> ${msg}`;
  logPanel.appendChild(div);
  if (logPanel.children.length > 5) logPanel.removeChild(logPanel.firstChild);
}

function extractKeyword(name) {
  const words = name.toLowerCase()
    .replace(/[^a-z\s]/g, ' ')
    .split(/\s+/)
    .map(w => w.trim())
    .filter(w => w.length > 2 && !STOPWORDS.has(w));
  if (!words.length) return null;
  const scored = words.map(w => ({ word: w, score: w.length + (w.length > 5 ? 2 : 0) }));
  scored.sort((a, b) => b.score - a.score);
  return scored[0].word;
}

async function fetchCatalogPage(cursor = '') {
  const cat = CATEGORY_MAP[currentCat];
  const sortType = currentPeriod === 'daily' ? 3 : currentPeriod === 'weekly' ? 4 : 5;
  const params = new URLSearchParams({
    category: 'Clothing',
    subcategory: cat.subcategoryId,
    sortType, sortAggregation: 1, limit: 30,
    ...(cursor ? { cursor } : {})
  });
  const r = await fetch(`${PROXY}/catalog?${params}`);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return await r.json();
}

async function fetchDetails(ids) {
  if (!ids.length) return [];
  const r = await fetch(`${PROXY}/details`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ items: ids.map(id => ({ itemType: 'Asset', id })) })
  });
  if (!r.ok) return [];
  const d = await r.json();
  return d.data || [];
}

function processItems(details) {
  for (const item of details) {
    const kw = extractKeyword(item.name || '');
    if (!kw) continue;
    scannedItems.push({ name: item.name, keyword: kw, favorites: item.favoriteCount || 0, price: item.price || 0 });
    keywordFreq[kw] = (keywordFreq[kw] || 0) + 1;
  }
}

async function runScan() {
  if (isScanning) return;
  isScanning = true;
  scanBtn.disabled = true;
  scanBtn.classList.add('scanning');
  scannedItems = []; keywordFreq = {};
  logPanel.innerHTML = '';

  log(`Scanning ${CATEGORY_MAP[currentCat].name} / ${currentPeriod}...`);
  renderItems(); renderKeywords();

  try {
    log('Connecting to proxy...');
    const page1 = await fetchCatalogPage();
    const ids1 = (page1.data || []).map(i => i.id);
    log(`Got ${ids1.length} items, fetching details...`);
    const details1 = await fetchDetails(ids1);
    processItems(details1);

    if (page1.nextPageCursor) {
      try {
        const page2 = await fetchCatalogPage(page1.nextPageCursor);
        const details2 = await fetchDetails((page2.data || []).map(i => i.id));
        processItems(details2);
      } catch(e) {}
    }

    log(`Done! ${scannedItems.length} items, ${Object.keys(keywordFreq).length} keywords.`, 'done');
  } catch(err) {
    log(`Error: ${err.message}`, 'err');
  }

  renderItems(); renderKeywords();
  itemCount.textContent = `${scannedItems.length} items`;
  kwCount.textContent = `${Object.keys(keywordFreq).length} keywords`;
  isScanning = false;
  scanBtn.disabled = false;
  scanBtn.classList.remove('scanning');
}

function renderKeywords() {
  const sorted = Object.entries(keywordFreq).sort((a,b) => b[1]-a[1]).slice(0,20);
  const max = sorted[0]?.[1] || 1;

  if (!sorted.length) {
    keywordDisplay.innerHTML = `<div class="keyword-grid"><div class="empty-state"><span class="icon">📡</span><p>Press SCAN TRENDS<br>to analyze live data</p></div></div>`;
    return;
  }

  if (currentView === 'chips') {
    keywordDisplay.innerHTML = `<div class="keyword-grid">${
      sorted.map(([word, count], i) => {
        const pct = (count/max*100).toFixed(0);
        const rc = i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'';
        return `<div class="kw-chip ${rc}"><span class="word" style="position:relative">${word}</span><span class="freq">×${count}</span><span style="position:absolute;left:0;top:0;bottom:0;width:${pct}%;background:var(--red);opacity:0.12;"></span></div>`;
      }).join('')
    }</div>`;
  } else {
    keywordDisplay.innerHTML = `<div class="bar-chart">${
      sorted.slice(0,12).map(([word,count]) => {
        const pct = (count/max*100).toFixed(1);
        return `<div class="bar-row">
          <div class="bar-label">${word}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
          <div class="bar-val">×${count}</div>
        </div>`;
      }).join('')
    }</div>`;
  }
}

function renderItems() {
  if (!scannedItems.length) {
    itemList.innerHTML = `<div style="padding:30px 20px;text-align:center;color:#333;font-size:10px;letter-spacing:2px;">NO DATA YET</div>`;
    return;
  }
  itemList.innerHTML = scannedItems.slice(0,40).map(item => `
    <div class="item-entry">
      <div class="item-name">${item.name}</div>
      <div class="item-meta">
        <span>❤ ${(item.favorites||0).toLocaleString()}</span>
        <span>💰 ${item.price ? item.price+'R$' : 'FREE'}</span>
      </div>
      <span class="keyword-badge">${item.keyword}</span>
    </div>`).join('');
}

scanBtn.addEventListener('click', runScan);
</script>

</body>
</html>
